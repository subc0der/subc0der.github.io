<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subcoder — Developer Portfolio</title>
  <meta name="description" content="Developer specializing in blockchain infrastructure, AI tooling, and creative software. Available for freelance and contract work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070c;
      --bg-card: rgba(255,255,255,0.03);
      --bg-card-hover: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(96,165,250,0.35);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --accent: #60a5fa;
      --accent-soft: rgba(96,165,250,0.12);
      --accent-glow: rgba(96,165,250,0.06);
      --purple: #a78bfa;
      --green: #4ade80;
      --green-soft: rgba(74,222,128,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(96,165,250,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 28px 48px;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      gap: 28px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .avatar:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.1);
    }

    .hero-text { flex: 1; }

    .hero-top {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .hero-text h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(120deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.73rem;
      font-weight: 500;
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid rgba(74,222,128,0.2);
      white-space: nowrap;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .bio {
      font-size: 0.92rem;
      color: var(--text-dim);
      margin-bottom: 22px;
      max-width: 520px;
      line-height: 1.65;
    }

    .hero-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 7px;
      font-size: 0.83rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--border-hover);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .btn-cta {
      background: var(--accent);
      border-color: var(--accent);
      color: #07070c;
      font-weight: 600;
    }

    .btn-cta:hover {
      background: #93c5fd;
      border-color: #93c5fd;
      color: #07070c;
    }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }

    .filter-btn:hover {
      border-color: rgba(96,165,250,0.3);
      color: var(--text-dim);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #07070c;
      font-weight: 600;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.22s, background 0.22s, transform 0.22s, box-shadow 0.22s;
      animation: fadeUp 0.35s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      position: relative;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-stars {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.72rem;
      color: var(--text-muted);
      flex-shrink: 0;
      padding-top: 2px;
    }

    .card-stars svg { opacity: 0.6; }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.6;
      flex: 1;
      position: relative;
    }

    .card-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      position: relative;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(96,165,250,0.18);
    }

    .tag.purple {
      background: rgba(167,139,250,0.1);
      color: var(--purple);
      border-color: rgba(167,139,250,0.18);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      position: relative;
      margin-top: auto;
    }

    .lang {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.74rem;
      color: var(--text-dim);
    }

    .lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.18s;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: transparent;
      white-space: nowrap;
    }

    .card-btn:hover {
      border-color: var(--border-hover);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .card-btn-demo {
      border-color: rgba(96,165,250,0.25);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .card-btn-demo:hover {
      background: rgba(96,165,250,0.2);
      border-color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      header { padding: 48px 20px 36px; }
      .hero { flex-direction: column; gap: 18px; }
      .hero-text h1 { font-size: 1.55rem; }
      main { padding: 0 20px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="hero">
    <img
      src="https://avatars.githubusercontent.com/u/18121535?v=4"
      alt="Subcoder"
      class="avatar"
    />
    <div class="hero-text">
      <div class="hero-top">
        <h1>Subcoder</h1>
        <span class="badge">Available for work</span>
      </div>
      <!-- UPDATE: replace this bio with your own 1-2 sentence intro -->
      <p class="bio">
        I build across the stack — zero-knowledge blockchain infrastructure,
        AI-powered tooling, and creative web and mobile apps. Open to freelance
        projects and contract work.
      </p>
      <div class="hero-links">
        <!-- UPDATE: replace the email below with yours -->
        <a href="mailto:m.khalin@gmail.com" class="btn btn-cta">
          Get in touch
        </a>
        <a href="https://github.com/subc0der" class="btn" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub
        </a>
        <a href="https://subcoder.com" class="btn" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
          subcoder.com
        </a>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="divider"></div>

  <div class="filters" id="filters" role="group" aria-label="Filter projects">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="blockchain">Blockchain</button>
    <button class="filter-btn" data-filter="ai">AI / ML</button>
    <button class="filter-btn" data-filter="audio">Audio</button>
    <button class="filter-btn" data-filter="game">Game Dev</button>
    <button class="filter-btn" data-filter="web">Web & Tools</button>
  </div>

  <div id="grid" class="grid" role="list"></div>
</main>

<footer>
  <a href="https://github.com/subc0der" target="_blank" rel="noopener">github.com/subc0der</a>
</footer>

<script>
  const LANG_COLORS = {
    TypeScript:  '#3178c6',
    JavaScript:  '#f1e05a',
    Kotlin:      '#7f52ff',
    Python:      '#3572A5',
    'C++':       '#f34b7d',
    HTML:        '#e34c26',
    Shell:       '#89e051',
  };

  const PURPLE_TAGS = new Set(['zero-knowledge', 'blender', 'android', 'python', 'cardano']);

  // ── Project data ─────────────────────────────────────────────────────────
  // To add a live demo: set demo: 'https://your-url.com'
  // To add a new project: copy a block and fill in the fields
  const PROJECTS = [
    {
      title: 'FTL Hi-Res Audio Player',
      slug:  'ftl-ai-hi-res-audio-player',
      desc:  'Native Android music player built for audiophiles. Supports hi-res audio formats with AI-powered audio enhancement and a custom DSP pipeline.',
      lang:  'Kotlin',
      stars: 4,
      tags:  ['ai', 'audio', 'android'],
      demo:  null,
    },
    {
      title: 'Midnight Cloak',
      slug:  'midnight-cloak',
      desc:  'Identity verification infrastructure built on zero-knowledge proofs. Lets users prove credentials without revealing underlying data, built for the Midnight blockchain.',
      lang:  'TypeScript',
      stars: 2,
      tags:  ['blockchain', 'zero-knowledge'],
      demo:  null,
    },
    {
      title: 'Midnight Authenticator',
      slug:  'midnight-authenticator',
      desc:  'TOTP authenticator that generates time-based one-time passwords anchored to the Midnight blockchain — privacy-preserving 2FA with on-chain verification.',
      lang:  'TypeScript',
      stars: 2,
      tags:  ['blockchain', 'zero-knowledge'],
      demo:  null,
    },
    {
      title: 'Cipher Matrix',
      slug:  'subcoder-cipher-matrix',
      desc:  'Browser-based cryptography toolkit. Encode, decode, encrypt, and convert between common formats — runs entirely client-side, nothing leaves the browser.',
      lang:  'HTML',
      stars: 2,
      tags:  ['web', 'tools'],
      demo:  null, // add your GitHub Pages URL here if deployed
    },
    {
      title: 'Cali Quakes',
      slug:  'Cali_Quakes',
      desc:  'Python agent that polls the USGS earthquake API and surfaces real-time seismic data for California. Configurable alert thresholds and event reporting.',
      lang:  'Python',
      stars: 2,
      tags:  ['web', 'tools'],
      demo:  null,
    },
    {
      title: 'UE5 Procedural Music Generator',
      slug:  'ue5-pmg',
      desc:  'Unreal Engine 5 plugin that generates adaptive, procedural music in real time using AI — scores dynamically to gameplay state so no two playthroughs sound the same.',
      lang:  'C++',
      stars: 1,
      tags:  ['ai', 'game', 'audio'],
      demo:  null,
    },
    {
      title: 'Cardano Companion',
      slug:  'cardano-companion',
      desc:  'Cardano wallet dashboard built with TypeScript. Displays ADA balance, native token holdings, and live staking reward data from the Cardano blockchain.',
      lang:  'TypeScript',
      stars: 1,
      tags:  ['blockchain', 'cardano'],
      demo:  null,
    },
    {
      title: 'Cyber Duck Race',
      slug:  'cyber-duck-race',
      desc:  'Cyberpunk-themed browser racing game with parallax scrolling, animated sprites, and real-time race logic. Built in vanilla JS — zero dependencies.',
      lang:  'JavaScript',
      stars: 1,
      tags:  ['web', 'game'],
      demo:  null, // add live URL if deployed
    },
    {
      title: 'Midnight Awesome dApps',
      slug:  'midnight-awesome-dapps',
      desc:  'Curated directory of dApps and developer tools building on the Midnight Network — maintained as a community resource for the ecosystem.',
      lang:  'Shell',
      stars: 1,
      tags:  ['blockchain'],
      demo:  null,
    },
    {
      title: 'SULO AI',
      slug:  'sulo-ai',
      desc:  'Blender addon that uses AI to automatically optimize UV layouts — reduces seams and packing waste, cutting manual UV unwrapping time significantly.',
      lang:  'Python',
      stars: 0,
      tags:  ['ai', 'blender'],
      demo:  null,
    },
    {
      title: 'Raffle Racer',
      slug:  'raffle-racer',
      desc:  'Live event racing web app for fundraisers and raffles. Participants race in real time on screen — built for engagement at in-person events.',
      lang:  'JavaScript',
      stars: 0,
      tags:  ['web', 'game'],
      demo:  null, // add live URL if deployed
    },
  ];

  // ── Filter logic ──────────────────────────────────────────────────────────
  const FILTER_MAP = {
    blockchain: p => p.tags.includes('blockchain'),
    ai:         p => p.tags.includes('ai'),
    audio:      p => p.tags.includes('audio'),
    game:       p => p.tags.includes('game'),
    web:        p => p.tags.includes('web'),
  };

  let activeFilter = 'all';

  // ── Render ────────────────────────────────────────────────────────────────
  function starSVG() {
    return `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  }

  function externalSVG() {
    return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  }

  function renderCard(project, index) {
    const delay = (index % 12) * 45;
    const langColor = LANG_COLORS[project.lang] || '#64748b';
    const ghUrl = `https://github.com/subc0der/${project.slug}`;

    const tagsHtml = project.tags
      .map(t => `<span class="tag${PURPLE_TAGS.has(t) ? ' purple' : ''}">${t}</span>`)
      .join('');

    const starsHtml = project.stars > 0
      ? `<span class="card-stars">${starSVG()} ${project.stars}</span>`
      : '';

    const demoBtn = project.demo
      ? `<a class="card-btn card-btn-demo" href="${project.demo}" target="_blank" rel="noopener">Demo ${externalSVG()}</a>`
      : '';

    return `
      <div class="card" style="animation-delay:${delay}ms" role="listitem">
        <div class="card-header">
          <span class="card-title">${project.title}</span>
          ${starsHtml}
        </div>
        <p class="card-desc">${project.desc}</p>
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-footer">
          <span class="lang">
            <span class="lang-dot" style="background:${langColor}"></span>
            ${project.lang}
          </span>
          <div class="card-actions">
            ${demoBtn}
            <a class="card-btn" href="${ghUrl}" target="_blank" rel="noopener">GitHub ${externalSVG()}</a>
          </div>
        </div>
      </div>`;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const projects = activeFilter === 'all'
      ? PROJECTS
      : PROJECTS.filter(FILTER_MAP[activeFilter] || (() => false));

    if (!projects.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;padding:40px 0;text-align:center;color:var(--text-muted)">No projects in this category.</div>`;
      return;
    }

    grid.innerHTML = projects.map((p, i) => renderCard(p, i)).join('');
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });

  renderGrid();
</script>
</body>
</html>
